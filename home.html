<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Barter.com</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.png">

  <!-- Fontawesome -->
  <script src="https://kit.fontawesome.com/a2d9d6c28b.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- ================= HEADER ================= -->
<header>

  <div class="header-row">

    <div class="logo">
      <img src="logo.png" alt="logo">
      <span>Barter</span>
    </div>

    <div class="categories">
      <a href="#">Clothes</a>
      <a href="#">Electronics</a>
      <a href="#">Hobbies</a>
      <a href="#">Vehicles</a>
    </div>

    <div class="post-btn" onclick="window.open('post.html','_blank')">
      Post
    </div>

  </div>

  <!-- SEARCH -->
  <div class="top-search">
    <input type="text" placeholder="Search for an item…">
  </div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">
  <h1>BARTER</h1>
  <p>Where your old is someone's gold.</p>
</section>

<!-- ================= PRODUCTS ================= -->
<section class="products">

  <h2 class="section-title">Featured Items</h2>

  <div class="product-grid">

    <div class="product-card">
      <img src="https://via.placeholder.com/300" alt="">
      <h3>Jacket</h3>
      <p>Swap for phone</p>
      <button>View</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/300" alt="">
      <h3>Mountain Bike</h3>
      <p>Trade for PC</p>
      <button>View</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/300" alt="">
      <h3>Nike Shoes</h3>
      <p>Looking for hoodie</p>
      <button>View</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/300" alt="">
      <h3>Guitar</h3>
      <p>Trade for keyboard</p>
      <button>View</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/300" alt="">
      <h3>Gaming Chair</h3>
      <p>Swap for desk</p>
      <button>View</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/300" alt="">
      <h3>Smart Watch</h3>
      <p>Looking for earbuds</p>
      <button>View</button>
    </div>

  </div>

</section>

</body>
</html>
