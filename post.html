<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barter - Post Item</title>
  <link rel="icon" href="logo.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #13b37d, #000);
      margin: 0;
      padding: 0;
    }

    header {
      background: #000000;
      color: #00ffaa;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ccc;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
      color: #ffffff;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: #fff;
      margin: 40px auto;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0d8156;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #d7e110;
    }
  </style>
</head>
<body>

<header>
  <h1>Barter.com</h1>
  <nav>
    <a href="home.html" onclick="window.close(); return false;">Home</a>
    
  </nav>
</header>

<div class="container">
  <h2>Post Your Item for Barter</h2>

  <form>
    <label>Item Name</label>
    <input type="text" placeholder="Ex: Old Phone, Shoes, Keyboard" required />

    <label>Description</label>
    <textarea rows="5" placeholder="Describe the condition, brand, age, etc." required></textarea>

    <label>What item do you want in exchange?</label>
    <input type="text" placeholder="Ex: Laptop charger, keyboard, any offer" />

    <label>Category</label>
    <select>
      <option>Electronics</option>
      <option>Clothing</option>
      <option>Accessories</option>
      <option>Collectibles</option>
      <option>Household Items</option>
      <option>Others</option>
    </select>

    <label>Upload Item Photos</label>
    <input type="file" multiple accept="image/*" />

    <button type="submit">Post Item</button>
  </form>
</div>

</body>
</html>
